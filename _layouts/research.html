---
layout: default
---
<article class="container detail-page">
  <header class="detail-header">
    <p class="eyebrow">{{ page.status | default: "Research" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="detail-subtitle">{{ page.subtitle }}</p>
    {% endif %}
    {% if page.links %}
    <ul class="inline-links">
      {% for link in page.links %}
      <li><a href="{{ link.url }}" target="_blank" rel="noreferrer">{{ link.label }}</a></li>
      {% endfor %}
    </ul>
    {% endif %}
  </header>

  <div class="content-block">
    {{ content }}
  </div>
</article>
