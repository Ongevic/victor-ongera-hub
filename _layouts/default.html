<!DOCTYPE html>
<html lang="en" data-theme="day">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.name }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% if page.use_pyscript %}
  <link rel="stylesheet" href="https://pyscript.net/releases/2026.1.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2026.1.1/core.js"></script>
  {% endif %}
  {% seo %}
</head>
<body>
  {% include navigation.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
