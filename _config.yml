name: "Victor Nyabuti Ong'era"
description: "Personal website for Victor Nyabuti Ong'era: interactive CV, research portfolio, and tutorial updates."
url: "https://ongevic.github.io"
baseurl: "/victor-ongera-hub"

profile:
  name: "Victor Nyabuti Ong'era"
  short_name: "Victor Nyabuti Ong'era"
  title: "PhD Researcher in Climate and Agriculture"
  location: "Pavia and Milan, Italy"
  tagline: "I work on climate-resilient farming systems using crop models, seasonal forecasts, and environmental data."
  intro: "This site brings together my CV, selected research, and short updates on projects, tutorials, and practical methods."
  bio:
    - "I am a PhD researcher in Sustainable Development and Climate Change at IUSS Pavia, with a background in environmental change and environmental engineering."
    - "My work focuses on crop simulation models, seasonal climate forecasts, and climate-risk analysis for agriculture, especially where better decisions can support more resilient farming systems."
  links:
    github: "https://github.com/Ongevic"
    linkedin: "https://www.linkedin.com/in/victor-nyabuti-ongera-156394114/"
    orcid: ""
    cv_pdf: "/assets/docs/Victor-Ongera-CV.pdf"
  interests:
    - "Crop simulation models"
    - "Seasonal climate forecasts"
    - "Climate-resilient farming systems"
    - "Remote sensing for agriculture"
    - "Data analysis for environmental decision-making"
  cv:
    summary:
      - "PhD researcher working on the links between climate, agriculture, and decision support, with experience across crop modelling, environmental analysis, and applied data work."
      - "This online CV is designed to make it easy to review my academic background, research experience, and technical skills without relying only on a PDF."
    highlights:
      - "Applies DSSAT, APSIM, and STICS to climate-risk and agricultural systems questions"
      - "Works with R, Python, Bash, and CDO tools for environmental data analysis"
      - "Combines field observations, remote sensing, and modelling in climate-agriculture research"
    experience:
      - role: "Visiting Researcher"
        organisation: "Department of Agroecology, Aarhus University"
        period: "June 2025 - December 2025"
        description: "Conducted field campaigns, integrated phenological and remote sensing datasets with crop models, and contributed to wheat growth and disease monitoring research."
      - role: "Intern"
        organisation: "CASSANDRA Lab, University of Milan"
        period: "March 2023 - October 2023"
        description: "Analyzed climate change impacts on wheat across countries, retrieved and processed historical and future climate data in R, and explored adaptation strategies through modelling and sensitivity analysis."
      - role: "Data Analyst"
        organisation: "Pallon"
        period: "March 2020 - November 2022"
        description: "Delivered data analysis, dashboards, and documentation to support business decision-making and improve data literacy for non-technical stakeholders."
      - role: "Intern"
        organisation: "General Directorate of Water Management (OVF)"
        period: "July 2019 - December 2019"
        description: "Supported suitability analysis, site preparation, and design interpretation for water-management related projects."
    education:
      - degree: "PhD in Sustainable Development and Climate Change"
        institution: "Istituto Universitario di Studi Superiori, Pavia"
        period: "2023 - 2026"
      - degree: "MSc in Environmental Change and Global Sustainability Science"
        institution: "University of Milan"
        period: "2021 - 2023"
      - degree: "BSc in Environmental Engineering"
        institution: "University of Public Service, Budapest"
        period: "2016 - 2021"
    skills:
      - "DSSAT"
      - "APSIM"
      - "STICS"
      - "R"
      - "Python"
      - "Bash"
      - "CDO tools"
      - "AutoCAD"
      - "EPANET"
      - "Remote sensing"

navigation:
  - title: "Home"
    url: "/"
  - title: "CV"
    url: "/cv/"
  - title: "Research"
    url: "/research/"
  - title: "Playground"
    url: "/playground/"
  - title: "Updates"
    url: "/news/"

collections:
  research:
    output: true
    permalink: /research/:name/
  news:
    output: true
    permalink: /news/:title/

markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "news"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "research"
    values:
      layout: "research"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
